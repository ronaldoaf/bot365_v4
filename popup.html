<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Bot365 v5</title>
		<link rel="stylesheet" type="text/css" href="css/popup.css" />      
		<script type="text/javascript" src="js/popup.js"></script>
	</head>
	<body>
		<div id='container'>
			<center>
				<div class='descricao'><h3>Liga/Desliga o Bot</h3></div>
				<div class="switch">				
					<input id="cmn-toggle-1" class="cmn-toggle cmn-toggle-round" type="checkbox">
					<label for="cmn-toggle-1">ABAS</label>
				</div>
				<hr/>
            <div class="aviso" id="aviso1">Alterar o usuário e senha</div>
            <div class="aviso" id="aviso2">O ClickType não está funcionando</div>
            <div class="aviso" id="aviso3">Adicione um licença válida</div>
				<hr/>
				<div class='descricao secao-titulo' data-secao='sec_erros'><h3>Últimos Erros <span class='seta'>▸</span></h3></div>
				<div id="sec_erros" class='secao' style="display:none;">
					<div id="erros" style="max-height:150px; overflow-y:auto; text-align:left; font-size:11px; width:100%;"></div>
				</div>
				<hr/>
				<div class='descricao secao-titulo' data-secao='sec_teste'><h3>Teste dos Seletores <span class='seta'>▸</span></h3></div>
				<div id="sec_teste" class='secao' style="display:none;">
					<button id="testar"><h4>Validar Elementos da Página</h4></button>
					<div id="resultado_teste" style="max-height:250px; overflow-y:auto; text-align:left; font-size:11px; width:100%; margin-top:6px;"></div>
				</div>
				<hr/>
				<div class='descricao'><h3>Configuração</h3></div>
				<textarea id="config"  rows="20" cols="50"></textarea>
				<button id="salva"><h4>Salvar Configuração</h4></button>				
			</center>			
		</div>
	</body>
</html>
